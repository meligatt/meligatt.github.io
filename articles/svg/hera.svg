<svg xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="800"
  height="600"
  viewbox="0 0 800 600"
  version="1.1"
  class="character">
    <g id="face" transform="translate(250, 130)">
      <rect id="face-outline" height="230" width="300" x="0" y="0" fill="#b7b44a" rx="40"/>

      <g id="eyes" transform="translate(0, 20)">
        <g id="left-eye" class="eyes" transform="translate(10, 90)">
          <circle id="eye" cx="60" r="30" fill="#348655" />
          <g class="eyeslashes" transform="translate(23, -20)">
            <line x1="0" y1="0" x2="10" y2="10" stroke="#030200" stroke-width="4"/>
            <line x1="0" y1="10" x2="10" y2="20" stroke="#030200" stroke-width="4"/>
            <line x1="0" y1="20" x2="10" y2="30" stroke="#030200" stroke-width="4"/>
          </g>
        </g>

        <g id="right-eye" class="eyes" transform="translate(280, 90) scale(-1, 1)">
          <circle id="eye" cx="60" r="30" fill="#348655"/>
          <g class="eyeslashes" transform="translate(23, -20)">
            <line x1="0" y1="0" x2="10" y2="10" stroke="#030200" stroke-width="4"/>
            <line x1="0" y1="10" x2="10" y2="20" stroke="#030200" stroke-width="4"/>
            <line x1="0" y1="20" x2="10" y2="30" stroke="#030200" stroke-width="4"/>
          </g>
        </g>
      </g>

      <g class="nose" transform="translate(135,120) scale(0.3)">
        <polygon fill="#b7b44a" stroke="#827e25" stroke-width="6" points="30,4 4,60 60,60" stroke-linejoin="round"/>
      </g>

      <g class="mouth" transform="translate(135,170)">
        <line x1="0" y1="0" x2="20" y2="0" stroke-linecap="round" stroke-width="5" stroke="#765238"/>
      </g>
    </g> <!--  close face group -->
  </svg>
